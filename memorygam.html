<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>memorygam</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #b3e5fc, #dcedc8);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #004d40;
    }

    h1 {
      color: #00695c;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      width: 100px;
      height: 100px;
      background-color: #4db6ac;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2em;
      cursor: pointer;
      position: relative;
      perspective: 1000px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      position: relative;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
    }

    .card-front {
      background-color: #4db6ac;
    }

    .card-back {
      background-color: #ffffff;
      color: #00695c;
      transform: rotateY(180deg);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 1.5em;
    }

    .info {
      margin-top: 20px;
      font-size: 1.2em;
    }

    .restart {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1em;
      background-color: #64dd17;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🧠 Memory Flip Game</h1>
<div class="info" id="moves">Moves: 0</div>
<div class="game-board" id="board"></div>
<button class="restart" onclick="startGame()">🔁 Restart Game</button>

<script>
  const board = document.getElementById("board");
  const movesDisplay = document.getElementById("moves");
  const icons = ['🍎', '🍌', '🍒', '🍇', '🍉', '🍍', '🥝', '🍑'];
  let cards = [];
  let flippedCards = [];
  let matched = 0;
  let moves = 0;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function createCard(icon) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">${icon}</div>
      </div>
    `;
    card.dataset.icon = icon;
    card.addEventListener("click", () => flipCard(card));
    return card;
  }

  function flipCard(card) {
    if (card.classList.contains("flipped") || flippedCards.length === 2) return;

    card.classList.add("flipped");
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      moves++;
      movesDisplay.textContent = `Moves: ${moves}`;

      const [first, second] = flippedCards;
      if (first.dataset.icon === second.dataset.icon) {
        matched++;
        flippedCards = [];
        if (matched === icons.length) {
          setTimeout(() => {
            alert(`🎉 You won in ${moves} moves!`);
          }, 500);
        }
      } else {
        setTimeout(() => {
          flippedCards.forEach(c => c.classList.remove("flipped"));
          flippedCards = [];
        }, 1000);
      }
    }
  }

  function startGame() {
    board.innerHTML = '';
    moves = 0;
    matched = 0;
    flippedCards = [];
    movesDisplay.textContent = `Moves: 0`;

    const gameIcons = shuffle([...icons, ...icons]);
    gameIcons.forEach(icon => {
      const card = createCard(icon);
      board.appendChild(card);
    });
  }

  // Start on load
  startGame();
</script>

</body>
</html>
