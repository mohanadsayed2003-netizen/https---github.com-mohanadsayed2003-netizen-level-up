<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Word Hunt Challenge</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom right, #b3e5fc, #d0f0c0);
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #005f73;
      font-size: 3em;
      margin-bottom: 10px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 6px;
      justify-content: center;
      margin: 20px 0;
    }

    .cell {
      width: 60px;
      height: 60px;
      background-color: #e0f7fa;
      border: 2px solid #00796b;
      font-size: 26px;
      font-weight: bold;
      color: #004d40;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.3s;
      border-radius: 10px;
    }

    .cell:hover {
      transform: scale(1.1);
      background-color: #b2dfdb;
    }

    .cell.selected {
      background-color: #81c784;
      color: #ffffff;
      transform: scale(1.05);
    }

    #wordDisplay {
      font-size: 22px;
      margin-bottom: 10px;
      color: #004d40;
    }

    #currentWord {
      font-weight: bold;
      color: #1b5e20;
    }

    #wordList {
      list-style: none;
      padding: 0;
      max-width: 300px;
      margin: 0 auto;
    }

    #wordList li {
      font-size: 20px;
      margin: 5px 0;
      color: #004d40;
    }

    .found {
      text-decoration: line-through;
      color: #2e7d32;
      font-weight: bold;
    }

    button {
      padding: 10px 18px;
      font-size: 18px;
      background-color: #4db6ac;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #00796b;
    }
  </style>
</head>
<body>

  <h1>Word Hunt Challenge</h1>
  <div id="wordDisplay">Current Word: <span id="currentWord"></span></div>
  <div id="grid"></div>
  <button onclick="submitWord()">Submit Word</button>

  <h2 style="color:#1b5e20;">Find these words:</h2>
  <ul id="wordList"></ul>

  <script>
    const wordsToFind = ['CAT', 'DOG', 'SUN', 'FUN', 'HAT'];
    const gridLetters = [
      'C', 'A', 'T', 'X', 'Y',
      'D', 'O', 'G', 'B', 'Z',
      'S', 'U', 'N', 'H', 'Q',
      'F', 'U', 'N', 'L', 'W',
      'H', 'A', 'T', 'E', 'R'
    ];

    const grid = document.getElementById('grid');
    const currentWordDisplay = document.getElementById('currentWord');
    const wordListElement = document.getElementById('wordList');

    let selectedCells = [];
    let currentWord = '';

    // Initialize grid
    for (let i = 0; i < 25; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.textContent = gridLetters[i];
      cell.dataset.index = i;

      cell.addEventListener('click', () => {
        if (!cell.classList.contains('selected')) {
          cell.classList.add('selected');
          selectedCells.push(cell);
          currentWord += cell.textContent;
          currentWordDisplay.textContent = currentWord;
        }
      });

      grid.appendChild(cell);
    }

    // Initialize word list
    wordsToFind.forEach(word => {
      const li = document.createElement('li');
      li.textContent = word;
      li.id = `word-${word}`;
      wordListElement.appendChild(li);
    });

    function submitWord() {
      if (wordsToFind.includes(currentWord)) {
        document.getElementById(`word-${currentWord}`).classList.add('found');
        alert(`🎉 Great job! You found: ${currentWord}`);
      } else {
        alert('Oops! Try again!');
      }

      // Reset
      selectedCells.forEach(cell => cell.classList.remove('selected'));
      selectedCells = [];
      currentWord = '';
      currentWordDisplay.textContent = '';
    }
  </script>
</body>
</html>
